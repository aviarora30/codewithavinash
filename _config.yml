title: Code With Avinash
description: Personal website of Avinash Arora, engineering leader and frontend architect.
url: https://codewithavinash.com
image: /assets/avinash.png

# Repo-only markdown (not copied to _site / not published). Add paths as needed.
exclude:
  - codewithavinash-content-strategy.md

collections:
  notes:
    output: true
    permalink: /notes/:name/
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      type: notes
    values:
      layout: note
      notes_styles: true
