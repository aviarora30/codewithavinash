---
layout: default
notes_styles: true
---
<main class="notes-main">
  <p class="note-back-link"><a href="/notes">← Back to Notes</a></p>
  <h1>Tags</h1>
  <ul class="note-list">
    {% for slug in site.data.tags.tag_slugs %}
      <li>
        <a class="note-title" href="{{ '/tags/' | append: slug | relative_url }}">#{{ slug }}</a>
      </li>
    {% endfor %}
  </ul>
</main>
